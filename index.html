<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f39ca5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BFE Jeopardy">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>BFE Messe Jeopardy</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-lockup">
          <p class="eyebrow">Messe-Challenge</p>
          <h1>Pflege Jeopardy</h1>
        </div>
        <img class="brand-logo" src="logo-pflegeschule.png" alt="Pflegeschule Logo">
      </header>

      <section class="statusbar" aria-label="Spielstatus">
        <article class="stat-block score-block">
          <span>Score</span>
          <strong id="scoreValue">0</strong>
        </article>
        <article class="stat-block">
          <span>Fragen</span>
          <strong id="progressValue">0/10</strong>
        </article>
        <article class="stat-block">
          <span>Max</span>
          <strong>1500</strong>
        </article>
        <button id="resetGame" class="reset-button" type="button">Neue Runde</button>
      </section>

      <section id="board" class="board" aria-label="Jeopardy Spielfeld"></section>
    </main>

    <dialog id="questionDialog" class="question-dialog" aria-labelledby="questionTitle">
      <div class="dialog-grid">
        <header class="question-header">
          <div>
            <p id="questionMeta" class="question-meta"></p>
            <h2 id="questionTitle"></h2>
          </div>
          <button id="closeDialog" class="icon-button" type="button" aria-label="Schließen">×</button>
        </header>

        <section class="answer-panel">
          <p class="answer-label">Lösung</p>
          <p id="answerText" class="answer-text is-hidden"></p>
          <button id="revealAnswer" class="primary-button" type="button">Lösung anzeigen</button>
        </section>

        <footer class="result-actions">
          <button id="awardPlayer" class="award-button" type="button">Richtig</button>
          <button id="missQuestion" class="miss-button" type="button">Falsch</button>
          <button id="keepQuestion" class="ghost-button" type="button">Zurücklegen</button>
        </footer>
      </div>
    </dialog>

    <dialog id="resultDialog" class="result-dialog" aria-labelledby="resultTitle">
      <div class="result-dialog-grid">
        <button id="resultClose" class="icon-button result-close" type="button" aria-label="Schließen">×</button>
        <p class="result-kicker">Challenge abgeschlossen</p>
        <h2 id="resultTitle"></h2>
        <div class="result-score-card">
          <span>Dein Score</span>
          <strong id="resultScore">0 / 1500</strong>
        </div>
        <p id="resultQuote" class="result-quote"></p>
        <p id="resultText" class="result-text"></p>
        <button id="resultRestart" class="reset-button result-restart" type="button">Neue Runde starten</button>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
